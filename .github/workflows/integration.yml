name: integration

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC — keeps clear of the 6/hr/IP rate-limit budget
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: Read-only integration tests
        env:
          VOICETEL_USERNAME: ${{ secrets.VOICETEL_USERNAME }}
          VOICETEL_PASSWORD: ${{ secrets.VOICETEL_PASSWORD }}
        run: pytest tests/integration -v
