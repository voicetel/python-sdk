name: Publish to PyPI

# Publishes the voicetel-api package to PyPI on every v* tag push.
# Uses PyPI Trusted Publishing (OIDC) — no token secret needed; the
# trust relationship is configured once at
# https://pypi.org/manage/account/publishing/ with:
#
#   PyPI Project Name:   voicetel-api
#   Owner:               voicetel
#   Repository name:     python-sdk
#   Workflow filename:   publish.yml
#   Environment name:    pypi
#
# Until that pending-publisher is added, the workflow will fail at the
# `pypa/gh-action-pypi-publish` step with an OIDC error. The build and
# distribution-artifact steps still run so you can inspect what would
# have shipped.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for Trusted Publishing OIDC handshake

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: pip install --upgrade build

      - name: Build wheel + sdist
        run: python -m build

      - name: List distribution artifacts
        run: ls -la dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          print-hash: true
